<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        (function () {
            var theme = localStorage.getItem('jntuk-theme') || 'light';
            document.documentElement.dataset.theme = theme;
            document.documentElement.style.colorScheme = theme;
        })();
    </script>
    <!-- Admin UI CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin-public-ui.css') }}">
     <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .content{
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .login-card { 
            background: #1e1e1e; 
            padding: 2rem 3rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); 
            text-align: center; 
            width: 380px;
            border: 1px solid #333;
        }
        h2 { 
            color: #ffffff; 
            margin-bottom: 1.5rem; 
        }
        .input-field { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 1rem; 
            border: 1px solid #444; 
            background-color: #2c2c2c;
            color: #e0e0e0;
            border-radius: 6px; 
            box-sizing: border-box; 
        }
        .button { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            background: linear-gradient(45deg, #3f51b5, #5c6bc0);
            color: white; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
        }
        .error { 
            color: #ef5350; 
            margin-top: 1rem; 
        }
    </style>
</head>
<body class="admin-public-ui">
    <header class="site-header">
        <div class="site-header-inner">
            <a href="/" class="brand-lockup">
                <span class="brand-mark" aria-hidden="true">
                    <img class="brand-logo brand-logo-light" src="{{ url_for('static', filename='images/logo-light.svg') }}" alt="">
                    <img class="brand-logo brand-logo-dark" src="{{ url_for('static', filename='images/logo-dark.svg') }}" alt="">
                </span>
                <span class="brand-copy">
                    <span class="brand-title">JURP</span>
                    <span class="brand-subtitle">Admin Portal</span>
                </span>
            </a>

            <div class="header-actions">
                <nav class="desktop-nav" aria-label="Primary navigation">
                    <a href="{{ main_portal_url }}" class="nav-link" target="_blank" rel="noreferrer">Go to main portal</a>
                </nav>
                <button class="theme-toggle" type="button" aria-label="Switch theme">
                    <i class="fas fa-sun theme-toggle-icon"></i>
                </button>
                <button class="mobile-menu-button" type="button" aria-label="Open navigation" aria-expanded="false">
                    <span class="hamburger-line" aria-hidden="true"></span>
                    <span class="hamburger-line" aria-hidden="true"></span>
                    <span class="hamburger-line" aria-hidden="true"></span>
                </button>
            </div>
        </div>
        <nav class="mobile-nav" aria-label="Mobile navigation">
            <div class="mobile-nav-inner">
                <a href="{{ main_portal_url }}" class="mobile-nav-link" target="_blank" rel="noreferrer">Go to main portal</a>
            </div>
        </nav>
    </header>

    <section class="page-hero">
        <div class="page-container page-hero-inner">
            <div class="eyebrow">Restricted Access</div>
            <h1 class="hero-title"><i class="fas fa-user-shield"></i> Admin Panel</h1>
            <p class="hero-description">
                Control the student results portal, manage data, and generate academic records.
            </p>
        </div>
    </section>

    <main class="site-main login-content page-container">
    <div class="login-card">
        <h2>Admin Login</h2>
        <form method="post">
            <input type="text" name="username" class="input-field" placeholder="Username" required>
            <input type="password" name="password" class="input-field" placeholder="Password" required>
            <button type="submit" class="button">Log In</button>
        </form>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </div>
    </main>
    <footer class="site-footer">
        <div class="site-footer-inner">
            <div>2026 JURP - JNTUK UCEN Results Portal</div>
            <div class="footer-creator">
                Created by <span>Sri Ram Sai Pavan Relangi</span>
            </div>
        </div>
    </footer>
    <script>
        function syncThemeIcon() {
            const button = document.querySelector('.theme-toggle');
            const icon = button?.querySelector('i');
            if (!icon) return;
            const isDark = document.documentElement.dataset.theme === 'dark';
            icon.className = isDark ? 'fas fa-sun theme-toggle-icon' : 'fas fa-moon theme-toggle-icon';
            button.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
        }

        syncThemeIcon();

        document.querySelector('.theme-toggle')?.addEventListener('click', () => {
            const current = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.dataset.theme = next;
            document.documentElement.style.colorScheme = next;
            localStorage.setItem('jntuk-theme', next);
            syncThemeIcon();
        });

        document.querySelector('.mobile-menu-button')?.addEventListener('click', function () {
            const nav = document.querySelector('.mobile-nav');
            const isOpen = nav.classList.toggle('open');
            this.classList.toggle('open', isOpen);
            this.setAttribute('aria-expanded', String(isOpen));
        });
    </script>
</body>
